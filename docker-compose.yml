# ============================================================
# docker-compose.yml — sre-decision-env Phase 1
# ============================================================
# Two services:
#   env-server  → OpenEnv FastAPI server (port 8000)
#   gradio-ui   → Gradio interactive demo  (port 7860)
#
# Usage:
#   1. Copy .env.example to .env and add your OPENROUTER_API_KEY
#   2. docker compose up --build
#   3. Open http://localhost:7860 in your browser
# ============================================================

services:

  # ----------------------------------------------------------
  # OpenEnv environment server (FastAPI + WebSocket)
  # ----------------------------------------------------------
  env-server:
    build:
      context: .               # build context = sre_decision_env/
      dockerfile: server/Dockerfile
      args:
        BUILD_MODE: standalone
    image: sre-decision-env-server:phase1
    container_name: sre_env_server
    ports:
      - "8000:8000"
    env_file:
      - .env                   # OPENROUTER_API_KEY lives here
    environment:
      - PYTHONPATH=/app/env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ----------------------------------------------------------
  # Gradio UI (connects to env-server over Docker network)
  # ----------------------------------------------------------
  gradio-ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    image: sre-decision-env-ui:phase1
    container_name: sre_gradio_ui
    ports:
      - "7860:7860"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      # Allow Gradio to bind to all interfaces inside container
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
    depends_on:
      env-server:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: sre_decision_net
